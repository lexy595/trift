<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Account page for Urban Revival Thrift." />
  <title>Urban Revival Thrift | Account</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="account">
  <header class="site-header">
    <nav class="container nav">
      <a href="index.html" class="brand">Urban Revival Thrift</a>
      <button class="menu-toggle" aria-label="Toggle menu">☰</button>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="cart.html">Cart <span class="cart-count">0</span></a></li>
        <li><a href="account.html" class="active">Account</a></li>
        <li><a href="admin.html">Admin</a></li>
      </ul>
    </nav>
  </header>

  <main class="section container">
    <div class="section-heading">
      <h1>My Account</h1>
      <p>Login, register, and manage your profile.</p>
    </div>

    <div class="account-layout">
      <section class="card">
        <h3>Login</h3>
        <form id="login-form" class="stack-form">
          <input type="email" id="login-email" placeholder="Email" required />
          <input type="password" id="login-password" placeholder="Password" required />
          <button class="btn btn-primary" type="submit">Login</button>
        </form>
      </section>

      <section class="card">
        <h3>Register</h3>
        <form id="register-form" class="stack-form">
          <input type="text" id="register-name" placeholder="Full Name" required />
          <input type="email" id="register-email" placeholder="Email" required />
          <input type="password" id="register-password" placeholder="Password" required />
          <button class="btn btn-dark" type="submit">Create Account</button>
        </form>
      </section>
    </div>

    <section id="profile-section" class="section card hidden">
      <div class="profile-header">
        <h3>Profile Management</h3>
        <button id="logout-btn" class="btn btn-outline">Logout</button>
      </div>
      <form id="profile-form" class="stack-form">
        <input type="text" id="profile-name" placeholder="Name" required />
        <input type="email" id="profile-email" placeholder="Email" required readonly />
        <input type="tel" id="profile-phone" placeholder="Phone" />
        <input type="text" id="profile-address" placeholder="Address" />
        <button type="submit" class="btn btn-primary">Save Profile</button>
      </form>
    </section>

    <section id="order-history" class="section card hidden">
      <h3>Order History</h3>
      <div id="orders-list"></div>
    </section>
  </main>

  <footer class="site-footer compact-footer">
    <div class="container">
      <p>© 2026 Urban Revival Thrift</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
