<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Customer account page for THRIFT BY B - register, login, profile, and order history." />
    <title>Account | THRIFT BY B</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="account">
    <header class="navbar">
      <div class="container nav-wrap">
        <a class="brand" href="index.html">THRIFT <span>BY B</span></a>
        <nav class="nav-links" id="navLinks">
          <a href="index.html">Home</a>
          <a href="shop.html">Shop</a>
          <a href="cart.html">Cart</a>
          <a href="checkout.html">Checkout</a>
          <a class="active" href="account.html" id="userChip">My Account</a>
          <a href="admin-login.html">Admin</a>
        </nav>
        <div class="nav-actions">
          <a class="cart-chip" href="cart.html">Cart <span data-cart-count>0</span></a>
          <button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button>
        </div>
      </div>
    </header>

    <main class="section">
      <div class="container auth-wrap">
        <div id="accountNotice"></div>

        <section id="authPanel" class="panel fade-in">
          <div class="auth-switch">
            <button class="active" data-auth-tab="register">Register</button>
            <button data-auth-tab="login">Login</button>
          </div>

          <form id="registerForm" class="form-grid">
            <div>
              <label for="regName">Full Name</label>
              <input id="regName" name="regName" type="text" required />
            </div>
            <div>
              <label for="regEmail">Email</label>
              <input id="regEmail" name="regEmail" type="email" required />
            </div>
            <div>
              <label for="regPhone">Phone</label>
              <input id="regPhone" name="regPhone" type="tel" required />
            </div>
            <div>
              <label for="regPassword">Password</label>
              <input id="regPassword" name="regPassword" type="password" required />
            </div>
            <div class="full">
              <label for="regAddress">Address</label>
              <textarea id="regAddress" name="regAddress" rows="3"></textarea>
            </div>
            <div class="full"><button class="btn btn-primary" type="submit">Create Account</button></div>
          </form>

          <form id="loginForm" class="form-grid hidden">
            <div>
              <label for="loginEmail">Email</label>
              <input id="loginEmail" name="loginEmail" type="email" required />
            </div>
            <div>
              <label for="loginPassword">Password</label>
              <input id="loginPassword" name="loginPassword" type="password" required />
            </div>
            <div class="full"><button class="btn btn-secondary" type="submit">Login</button></div>
          </form>
        </section>

        <section id="profilePanel" class="hidden panel fade-in">
          <div class="summary-line">
            <h2 style="margin: 0">Welcome, <span id="profileNameText"></span></h2>
            <button class="btn btn-light" data-logout type="button">Logout</button>
          </div>
          <h3>Manage Profile</h3>
          <form id="profileForm" class="form-grid">
            <div>
              <label for="profileName">Name</label>
              <input id="profileName" name="profileName" type="text" required />
            </div>
            <div>
              <label for="profilePhone">Phone</label>
              <input id="profilePhone" name="profilePhone" type="tel" required />
            </div>
            <div class="full">
              <label for="profileAddress">Address</label>
              <textarea id="profileAddress" name="profileAddress" rows="3"></textarea>
            </div>
            <div class="full"><button class="btn btn-primary" type="submit">Update Profile</button></div>
          </form>

          <h3>Order History</h3>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Order ID</th>
                  <th>Date</th>
                  <th>Items</th>
                  <th>Delivery</th>
                  <th>Total</th>
                </tr>
              </thead>
              <tbody id="orderHistoryBody"></tbody>
            </table>
          </div>
        </section>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
