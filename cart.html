<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Manage your THRIFT BY B cart, quantities, coupon, and delivery." />
    <title>Cart | THRIFT BY B</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="cart">
    <header class="navbar">
      <div class="container nav-wrap">
        <a class="brand" href="index.html">THRIFT <span>BY B</span></a>
        <nav class="nav-links" id="navLinks">
          <a href="index.html">Home</a>
          <a href="shop.html">Shop</a>
          <a class="active" href="cart.html">Cart</a>
          <a href="checkout.html">Checkout</a>
          <a href="account.html" id="userChip">My Account</a>
          <a href="admin-login.html">Admin</a>
        </nav>
        <div class="nav-actions">
          <a class="cart-chip" href="cart.html">Cart <span data-cart-count>0</span></a>
          <button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button>
        </div>
      </div>
    </header>

    <main class="section">
      <div class="container two-col">
        <section class="panel fade-in">
          <h1 class="section-title">Your Cart</h1>
          <div id="cartList" class="cart-list"></div>
        </section>
        <aside class="panel fade-in">
          <h2>Order Summary</h2>
          <div id="cartNotice"></div>
          <div class="filter-group">
            <label for="couponCode">Coupon code</label>
            <input id="couponCode" type="text" placeholder="FEM10" />
            <button id="applyCoupon" class="btn btn-light" type="button">Apply Coupon</button>
          </div>
          <div class="filter-group">
            <label for="cartDeliveryOption">Delivery Option</label>
            <select id="cartDeliveryOption">
              <option value="lagos_pickup">Lagos Pickup (₦0)</option>
              <option value="lagos_delivery">Lagos Delivery (₦2,500)</option>
              <option value="nationwide_delivery">Nationwide Delivery (₦5,000)</option>
            </select>
          </div>
          <div class="summary-line"><span>Subtotal</span><strong id="cartSubtotal">₦0</strong></div>
          <div class="summary-line"><span>Discount</span><strong id="cartDiscount">₦0</strong></div>
          <div class="summary-line"><span>Delivery</span><strong id="cartDeliveryFee">₦0</strong></div>
          <div class="summary-line total"><span>Total</span><strong id="cartTotal">₦0</strong></div>
          <button id="goCheckout" class="btn btn-primary full">Proceed to Checkout</button>
        </aside>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
