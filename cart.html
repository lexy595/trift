<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Shopping cart for Urban Revival Thrift." />
  <title>Urban Revival Thrift | Cart</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="cart">
  <header class="site-header">
    <nav class="container nav">
      <a href="index.html" class="brand">Urban Revival Thrift</a>
      <button class="menu-toggle" aria-label="Toggle menu">☰</button>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="cart.html" class="active">Cart <span class="cart-count">0</span></a></li>
        <li><a href="account.html">Account</a></li>
        <li><a href="admin.html">Admin</a></li>
      </ul>
    </nav>
  </header>

  <main class="section container">
    <div class="section-heading">
      <h1>Your Cart</h1>
      <p>Review your pieces before checkout.</p>
    </div>

    <div class="cart-layout">
      <section>
        <div id="cart-items" class="cart-items"></div>
      </section>

      <aside class="card summary-box">
        <h3>Order Summary</h3>
        <div class="summary-row"><span>Subtotal</span><span id="cart-subtotal">$0.00</span></div>
        <div class="summary-row"><span>Shipping</span><span id="cart-shipping">$0.00</span></div>
        <div class="summary-row"><span>Discount</span><span id="cart-discount">-$0.00</span></div>
        <div class="summary-row total"><span>Total</span><span id="cart-total">$0.00</span></div>

        <div class="coupon-wrap">
          <input type="text" id="coupon-code" placeholder="Coupon code" />
          <button id="apply-coupon" class="btn btn-dark">Apply</button>
        </div>
        <p class="muted">Use <strong>THRIFT10</strong> for 10% off.</p>

        <a href="checkout.html" class="btn btn-primary full">Proceed to Checkout</a>
      </aside>
    </div>
  </main>

  <footer class="site-footer compact-footer">
    <div class="container">
      <p>© 2026 Urban Revival Thrift</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
