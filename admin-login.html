<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Admin login for THRIFT BY B dashboard." />
    <title>Admin Login | THRIFT BY B</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="admin-login">
    <main class="section">
      <div class="container auth-wrap">
        <section class="panel fade-in">
          <h1 class="section-title">Admin Login</h1>
          <p class="section-subtitle">Restricted access for store managers only.</p>
          <div id="adminNotice"></div>
          <form id="adminLoginForm" class="form-grid">
            <div class="full">
              <label for="adminEmail">Email</label>
              <input id="adminEmail" name="adminEmail" type="email" required />
            </div>
            <div class="full">
              <label for="adminPassword">Password</label>
              <input id="adminPassword" name="adminPassword" type="password" required />
            </div>
            <div class="full"><button class="btn btn-primary" type="submit">Login as Admin</button></div>
          </form>
          <p><a href="index.html">Back to storefront</a></p>
        </section>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
