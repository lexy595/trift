<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Product details for THRIFT BY B thrift fashion items." />
    <title>Product Details | THRIFT BY B</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="product">
    <header class="navbar">
      <div class="container nav-wrap">
        <a class="brand" href="index.html">THRIFT <span>BY B</span></a>
        <nav class="nav-links" id="navLinks">
          <a href="index.html">Home</a>
          <a href="shop.html">Shop</a>
          <a href="cart.html">Cart</a>
          <a href="checkout.html">Checkout</a>
          <a href="account.html" id="userChip">My Account</a>
          <a href="admin-login.html">Admin</a>
        </nav>
        <div class="nav-actions">
          <a class="cart-chip" href="cart.html">Cart <span data-cart-count>0</span></a>
          <button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button>
        </div>
      </div>
    </header>

    <main class="section">
      <div class="container product-page-grid">
        <section class="product-gallery fade-in">
          <img id="productMainImage" class="product-main-image" src="" alt="Product image" />
          <div id="productThumbnails" class="thumb-row"></div>
        </section>
        <section class="panel fade-in">
          <span class="badge" id="productCondition"></span>
          <h1 id="productName" class="section-title"></h1>
          <p id="productCategory" class="section-subtitle"></p>
          <p id="productPrice" class="price"></p>
          <p id="productDescription"></p>
          <div class="filter-group">
            <label for="productSize">Select Size</label>
            <select id="productSize"></select>
          </div>
          <button id="addToCartProduct" class="btn btn-primary">Add to Cart</button>
        </section>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
