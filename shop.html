<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Shop curated thrift products from Urban Revival Thrift." />
  <title>Urban Revival Thrift | Shop</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="shop">
  <header class="site-header">
    <nav class="container nav">
      <a href="index.html" class="brand">Urban Revival Thrift</a>
      <button class="menu-toggle" aria-label="Toggle menu">☰</button>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html" class="active">Shop</a></li>
        <li><a href="cart.html">Cart <span class="cart-count">0</span></a></li>
        <li><a href="account.html">Account</a></li>
        <li><a href="admin.html">Admin</a></li>
      </ul>
    </nav>
  </header>

  <main class="section container">
    <div class="section-heading">
      <h1>Shop All Pieces</h1>
      <p>Find vintage staples and rare streetwear finds.</p>
    </div>

    <div class="shop-layout">
      <aside class="filters card">
        <h3>Filter Products</h3>

        <label for="filter-price">Max Price ($)</label>
        <input type="range" id="filter-price" min="10" max="200" value="200" />
        <p>Up to: $<span id="price-value">200</span></p>

        <label for="filter-category">Category</label>
        <select id="filter-category">
          <option value="all">All</option>
          <option value="Tops">Tops</option>
          <option value="Bottoms">Bottoms</option>
          <option value="Jackets">Jackets</option>
          <option value="Vintage">Vintage</option>
          <option value="Accessories">Accessories</option>
        </select>

        <label for="filter-size">Size</label>
        <select id="filter-size">
          <option value="all">All</option>
          <option value="XS">XS</option>
          <option value="S">S</option>
          <option value="M">M</option>
          <option value="L">L</option>
          <option value="XL">XL</option>
        </select>

        <label for="filter-gender">Gender</label>
        <select id="filter-gender">
          <option value="all">All</option>
          <option value="Men">Men</option>
          <option value="Women">Women</option>
          <option value="Unisex">Unisex</option>
        </select>

        <label for="sort-products">Sort By</label>
        <select id="sort-products">
          <option value="newest">Newest</option>
          <option value="low-high">Price: Low to High</option>
          <option value="high-low">Price: High to Low</option>
        </select>
      </aside>

      <section>
        <div id="shop-grid" class="product-grid"></div>
      </section>
    </div>
  </main>

  <footer class="site-footer compact-footer">
    <div class="container">
      <p>© 2026 Urban Revival Thrift</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
