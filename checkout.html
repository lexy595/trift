<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Checkout securely with Paystack demo for THRIFT BY B." />
    <title>Checkout | THRIFT BY B</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="checkout">
    <header class="navbar">
      <div class="container nav-wrap">
        <a class="brand" href="index.html">THRIFT <span>BY B</span></a>
        <nav class="nav-links" id="navLinks">
          <a href="index.html">Home</a>
          <a href="shop.html">Shop</a>
          <a href="cart.html">Cart</a>
          <a class="active" href="checkout.html">Checkout</a>
          <a href="account.html" id="userChip">My Account</a>
          <a href="admin-login.html">Admin</a>
        </nav>
        <div class="nav-actions">
          <a class="cart-chip" href="cart.html">Cart <span data-cart-count>0</span></a>
          <button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button>
        </div>
      </div>
    </header>

    <main class="section">
      <div class="container two-col">
        <section class="panel fade-in">
          <h1 class="section-title">Checkout</h1>
          <div id="checkoutNotice"></div>
          <form id="checkoutForm" class="form-grid">
            <div>
              <label for="fullName">Full Name</label>
              <input id="fullName" name="fullName" type="text" required />
            </div>
            <div>
              <label for="email">Email</label>
              <input id="email" name="email" type="email" required />
            </div>
            <div>
              <label for="phone">Phone</label>
              <input id="phone" name="phone" type="tel" required />
            </div>
            <div class="full">
              <label for="address">Shipping Address</label>
              <textarea id="address" name="address" rows="3" required></textarea>
            </div>
            <div class="full">
              <label for="deliveryOption">Delivery Option</label>
              <select id="deliveryOption" name="deliveryOption">
                <option value="lagos_pickup">Lagos Pickup</option>
                <option value="lagos_delivery">Lagos Delivery</option>
                <option value="nationwide_delivery">Nationwide Delivery</option>
              </select>
            </div>
            <div class="full">
              <button class="btn btn-primary" type="submit">Pay with Paystack</button>
            </div>
          </form>
        </section>
        <aside class="panel fade-in">
          <h2>Order Summary</h2>
          <div id="checkoutSummary"></div>
          <div class="summary-line total">
            <span>Total</span>
            <strong id="checkoutTotal">₦0</strong>
          </div>
        </aside>
      </div>
    </main>

    <script src="https://js.paystack.co/v1/inline.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
