<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Checkout at Urban Revival Thrift." />
  <title>Urban Revival Thrift | Checkout</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="checkout">
  <header class="site-header">
    <nav class="container nav">
      <a href="index.html" class="brand">Urban Revival Thrift</a>
      <button class="menu-toggle" aria-label="Toggle menu">☰</button>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="cart.html">Cart <span class="cart-count">0</span></a></li>
        <li><a href="account.html">Account</a></li>
        <li><a href="admin.html">Admin</a></li>
      </ul>
    </nav>
  </header>

  <main class="section container">
    <div class="section-heading">
      <h1>Checkout</h1>
      <p>Secure your selected thrift pieces.</p>
    </div>

    <div id="checkout-wrapper" class="checkout-layout">
      <form id="checkout-form" class="card checkout-form">
        <h3>Customer Details</h3>
        <input type="text" id="fullName" placeholder="Full Name" required />
        <input type="email" id="email" placeholder="Email" required />
        <input type="tel" id="phone" placeholder="Phone" required />

        <h3>Shipping Address</h3>
        <input type="text" id="address" placeholder="Street Address" required />
        <input type="text" id="city" placeholder="City" required />
        <input type="text" id="state" placeholder="State/Region" required />
        <input type="text" id="zip" placeholder="ZIP / Postal Code" required />

        <h3>Delivery Method</h3>
        <label><input type="radio" name="delivery" value="Standard (3-5 days)" checked /> Standard (3-5 days)</label>
        <label><input type="radio" name="delivery" value="Express (1-2 days)" /> Express (1-2 days)</label>

        <h3>Payment Method (Demo)</h3>
        <label><input type="radio" name="payment" value="Stripe" checked /> Stripe</label>
        <label><input type="radio" name="payment" value="PayPal" /> PayPal</label>

        <button type="submit" class="btn btn-primary full">Place Order</button>
      </form>

      <aside class="card summary-box">
        <h3>Order Summary</h3>
        <div id="checkout-items"></div>
        <div class="summary-row"><span>Subtotal</span><span id="checkout-subtotal">$0.00</span></div>
        <div class="summary-row"><span>Shipping</span><span id="checkout-shipping">$0.00</span></div>
        <div class="summary-row"><span>Discount</span><span id="checkout-discount">-$0.00</span></div>
        <div class="summary-row total"><span>Total</span><span id="checkout-total">$0.00</span></div>
      </aside>
    </div>

    <section id="order-confirmation" class="card hidden"></section>
  </main>

  <footer class="site-footer compact-footer">
    <div class="container">
      <p>© 2026 Urban Revival Thrift</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
