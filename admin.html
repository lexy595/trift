<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Admin dashboard for Urban Revival Thrift." />
  <title>Urban Revival Thrift | Admin Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="admin">
  <header class="site-header">
    <nav class="container nav">
      <a href="index.html" class="brand">Urban Revival Thrift</a>
      <button class="menu-toggle" aria-label="Toggle menu">☰</button>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="cart.html">Cart <span class="cart-count">0</span></a></li>
        <li><a href="account.html">Account</a></li>
        <li><a href="admin.html" class="active">Admin</a></li>
      </ul>
    </nav>
  </header>

  <main class="section container">
    <div class="section-heading">
      <h1>Admin Dashboard</h1>
      <p>Manage products, orders, and sales performance.</p>
    </div>

    <section class="admin-stats">
      <article class="card stat-card">
        <h4>Total Revenue</h4>
        <p id="stat-revenue">$0.00</p>
      </article>
      <article class="card stat-card">
        <h4>Total Orders</h4>
        <p id="stat-orders">0</p>
      </article>
    </section>

    <section class="card section">
      <h3 id="admin-form-title">Add New Product</h3>
      <form id="admin-product-form" class="admin-form-grid">
        <input type="hidden" id="admin-product-id" />
        <input type="text" id="admin-name" placeholder="Product Name" required />
        <input type="number" id="admin-price" placeholder="Price" min="1" required />
        <select id="admin-size" required>
          <option value="">Select Size</option>
          <option>XS</option><option>S</option><option>M</option><option>L</option><option>XL</option>
        </select>
        <select id="admin-category" required>
          <option value="">Select Category</option>
          <option>Tops</option><option>Bottoms</option><option>Jackets</option><option>Vintage</option><option>Accessories</option>
        </select>
        <select id="admin-gender" required>
          <option value="">Select Gender</option>
          <option>Men</option><option>Women</option><option>Unisex</option>
        </select>
        <select id="admin-condition" required>
          <option value="">Condition</option>
          <option>Like New</option><option>Gently Used</option><option>Vintage</option>
        </select>
        <input type="text" id="admin-image" placeholder="Main Image URL" required />
        <input type="text" id="admin-images" placeholder="Extra Image URLs (comma separated)" />
        <textarea id="admin-description" placeholder="Description" rows="3" required></textarea>
        <button class="btn btn-primary" type="submit">Save Product</button>
      </form>
    </section>

    <section class="section">
      <h3>Product List</h3>
      <div id="admin-products" class="admin-table-wrap"></div>
    </section>

    <section class="section">
      <h3>Orders</h3>
      <div id="admin-orders" class="admin-table-wrap"></div>
    </section>
  </main>

  <footer class="site-footer compact-footer">
    <div class="container">
      <p>© 2026 Urban Revival Thrift</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
